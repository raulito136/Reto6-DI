<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - CESUR Viajes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container text-center">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="display-1 text-danger mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>

          <h1 class="fw-bold text-dark mb-3" th:text="${tituloError != null ? tituloError : '¡Ups! Algo salió mal'}">
            Error Inesperado
          </h1>

          <p class="lead text-muted mb-5" th:text="${mensajeError != null ? mensajeError : 'La página que buscas no está disponible o ha ocurrido un error interno.'}">
            Detalles del error no disponibles.
          </p>

          <a th:href="@{/hoteles}" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
            <i class="bi bi-house-door me-2"></i> Volver al inicio
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>

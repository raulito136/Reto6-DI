<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Hotel - CESUR Viajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-5 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/hoteles}">
            <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0" th:text="${hotel.id == null ? 'Registrar Nuevo Hotel' : 'Editar Hotel'}">
                        Formulario de Hotel
                    </h4>
                </div>

                <div class="card-body p-5">
                    <form th:action="@{/hoteles/guardar}" th:object="${hotel}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label fw-semibold">Nombre del Hotel</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required placeholder="Ej: Hotel Paraíso">
                            </div>
                            <div class="col-md-6">
                                <label for="ubicacion" class="form-label fw-semibold">Ubicación</label>
                                <input type="text" class="form-control" id="ubicacion" th:field="*{ubicacion}" required placeholder="Ej: Madrid, España">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-4">
                                <label for="estrellas" class="form-label fw-semibold">Estrellas</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-star-fill text-warning"></i></span>
                                    <input type="number" step="1" min="1" max="5" class="form-control" id="estrellas" th:field="*{estrellas}" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="calificacion" class="form-label fw-semibold">Puntuación (0-10)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-award text-info"></i></span>
                                    <input type="number" step="0.1" min="0" max="10" class="form-control" id="calificacion" th:field="*{calificacion}" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="precioPorNoche" class="form-label fw-semibold">Precio / Noche (€)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
                                    <input type="number" step="1" min="0" class="form-control" id="precioPorNoche" th:field="*{precioPorNoche}" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Seleccionar ubicación en el mapa</label>
                            <div id="map" class="rounded border" style="height: 300px;"></div>
                            <small class="text-muted">Haz clic en el mapa para seleccionar la ubicación exacta.</small>
                            <input type="hidden" id="latitud" th:field="*{latitud}">
                            <input type="hidden" id="longitud" th:field="*{longitud}">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4 border-top pt-4">
                            <a th:href="@{/hoteles}" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save"></i> Guardar Hotel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        /*<![CDATA[*/
        var lat = /*[[${hotel.latitud}]]*/ 40.416775;
        var lng = /*[[${hotel.longitud}]]*/ -3.703790;

        // Si no hay coordenadas previas, usar Madrid por defecto
        if (lat === null) lat = 40.416775;
        if (lng === null) lng = -3.703790;

        var map = L.map('map').setView([lat, lng], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var marker = L.marker([lat, lng], {draggable: true}).addTo(map);

        // Actualizar inputs ocultos al mover el marcador
        function updateInputs(lat, lng) {
            document.getElementById('latitud').value = lat;
            document.getElementById('longitud').value = lng;
        }

        // Inicializar inputs si ya hay valores
        updateInputs(lat, lng);

        // Evento al arrastrar el marcador
        marker.on('dragend', function(e) {
            var position = marker.getLatLng();
            updateInputs(position.lat, position.lng);
        });

        // Evento al hacer clic en el mapa
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            updateInputs(e.latlng.lat, e.latlng.lng);
        });
        /*]]>*/
    });
</script>
</body>
</html>

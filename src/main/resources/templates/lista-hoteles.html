<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Hoteles - Gestión Turística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/hoteles}">
            <i class="bi bi-buildings"></i> CESUR Viajes
        </a>

        <div class="d-flex">
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-light">
                Iniciar Sesión
            </a>

            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">

    <div class="row align-items-center mb-4">
        <div class="col-md-3">
            <h2 class="fw-bold text-dark m-0">Catálogo</h2>
        </div>

        <div class="col-md-6">
            <form th:action="@{/hoteles/filtrar}" method="get" class="d-flex">
                <select name="tipo" class="form-select me-2" style="max-width: 200px;" required>
                    <option value="ubicacion">Ubicación</option>
                    <option value="nombre">Nombre exacto</option>
                    <option value="precio_superior">Precio mayor a (€)</option>
                    <option value="precio_inferior">Precio menor a (€)</option>
                    <option value="calificacion_superior">Puntuación mayor a</option>
                    <option value="calificacion_inferior">Puntuación menor a</option>
                </select>
                <input type="text" name="valor" class="form-control me-2" placeholder="Escribe aquí..." required>

                <button type="submit" class="btn btn-secondary px-4">Filtrar</button>
                <a th:href="@{/hoteles}" class="btn btn-outline-secondary ms-1" title="Limpiar filtros">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>
        </div>
        <div class="col-md-3 text-end">
            <a sec:authorize="isAuthenticated()" th:href="@{/hoteles/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nuevo Hotel
            </a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped m-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Estrellas</th>
                        <th>Puntuación</th>
                        <th>Precio / Noche</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="hotel : ${hoteles}">
                        <td class="fw-semibold" th:text="${hotel.nombre}">Nombre del Hotel</td>
                        <td>
                            <i class="bi bi-geo-alt text-danger"></i>
                            <span th:text="${hotel.ubicacion}">Ubicación</span>
                        </td>
                        <td>
                            <i class="bi bi-star-fill text-warning"></i>
                            <span th:text="${hotel.estrellas}">5</span>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${hotel.calificacion} + ' / 10'">8.5 / 10</span>
                        </td>
                        <td>
                            <span class="badge bg-success fs-6" th:text="${hotel.precioPorNoche} + ' €'">100 €</span>
                        </td>
                        <td class="text-center text-nowrap">
                            <a th:href="@{/hoteles/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Ver
                            </a>

                            <a sec:authorize="isAuthenticated()" th:href="@{/hoteles/editar/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-warning ms-1">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a sec:authorize="isAuthenticated()" th:href="@{/hoteles/eliminar/{id}(id=${hotel.id})}"
                               class="btn btn-sm btn-outline-danger ms-1"
                               onclick="return confirm('¿Estás seguro de que deseas eliminar este hotel?');">
                                <i class="bi bi-trash"></i> Borrar
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(hoteles)}">
                        <td colspan="6" class="text-center text-muted p-5">
                            <i class="bi bi-search display-4 d-block mb-3 text-secondary"></i>
                            No se encontraron hoteles que coincidan con tu búsqueda.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
